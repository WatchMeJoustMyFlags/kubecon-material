name: Deploy Slides to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'cloud-native-linz-presentation/**'
      - 'kubecon-cloudnativecon-europe-presentation/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build cloud-native-linz-presentation
        working-directory: cloud-native-linz-presentation
        run: |
          npm ci
          npm run build -- --base /kubecon-material/cloud-native-linz-presentation/
          mkdir -p ../gh-pages/cloud-native-linz-presentation
          cp -r dist/. ../gh-pages/cloud-native-linz-presentation/

      - name: Build kubecon-cloudnativecon-europe-presentation
        working-directory: kubecon-cloudnativecon-europe-presentation
        run: |
          npm ci
          npm run build -- --base /kubecon-material/kubecon-cloudnativecon-europe-presentation/
          mkdir -p ../gh-pages/kubecon-cloudnativecon-europe-presentation
          cp -r dist/. ../gh-pages/kubecon-cloudnativecon-europe-presentation/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
